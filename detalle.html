<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biografía</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="glosario.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
        
        .tooltip {
    font-weight: bold;
    color: #0F4170; /* azul de la página */
    position: relative;
    cursor: pointer;
}

        .tooltiptext {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 5px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            width: max-content;
            max-width: 250px;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
<header class="encabezado">
    <div class="contenido-header">
        <div class="logo">
            <img src="recursos/logo2.png" alt="Logo">
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="biografias.html">Biografías</a></li>
                <li><a href="notas.html">Malvinas</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="imagen-rasgada">
    <img src="recursos/Header.png" alt="Efecto rasgado">
</div>

<main id="detalle-container">
</main>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');

fetch('biografias.json')
  .then(r => r.json())
  .then(personas => {
    const p = personas.find(x => x.id === id);
    if (!p) {
      document.getElementById('detalle-container').innerHTML = '<p>Biografía no encontrada.</p>';
      return;
    }
    
    document.getElementById('detalle-container').innerHTML = `
      <div class="bio-header" style="margin:2rem auto 0; max-width: 90vw; text-align:center;">
        <div style="display:flex; justify-content:center; align-items:center; gap:2rem;">
          <img src="${p.foto}" alt="${p.nombre}" style="max-width:300px; width:100%; height:auto;">
          <div style="text-align:left; font-size:1.2rem;">
            <div id="bio-id" style="font-family:'Vanguard CF SemiBold', sans-serif; font-size:2.8rem; color:#0F4170"><strong>${p.nombre}</strong></div>
            <div id="bio-subtitulo" style="margin-top:0.3rem; font-style:italic;">${p.subtitulo || ''}</div>
          </div>
        </div>
        <div id="bio-texto" style="margin-top:2rem; white-space:pre-wrap; text-align:justify; width:100%; font-family:'Public Sans', sans-serif; font-size:1.1rem;">
          ${p.texto}
        </div>
      </div>
    `;

    // Aplicar glosario después de insertar el contenido dinámico
    aplicarGlosario();
  })
  .catch(err => console.error(err));
</script>

</body>
</html>
